<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#0d0708" />
<title>Hourglass</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400;1,500&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
  body {
    border-radius: 24px;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
    font-family: "Cormorant Garamond", "Times New Roman", serif;
    background: #050306;
    position: relative;
    color: #e8d4b5;
    transition: background 1.4s ease;
  }
  body[data-theme="sahara"]   { background: radial-gradient(ellipse at 50% 42%, #2d160c 0%, #160806 55%, #060201 100%); }
  body[data-theme="geode"]    { background: radial-gradient(ellipse at 50% 42%, #1d1238 0%, #0c0820 55%, #02010c 100%); }
  body[data-theme="glowsand"] { background: radial-gradient(ellipse at 50% 42%, #051c28 0%, #021018 55%, #00060c 100%); }

  /* Subtle aura behind hourglass for theme color */
  .aura {
    position: absolute;
    pointer-events: none;
    border-radius: 50%;
    filter: blur(60px);
    opacity: 0.42;
    z-index: 0;
    transition: background 1.4s ease, opacity 1.4s ease;
    mix-blend-mode: screen;
  }
  body[data-theme="sahara"]   .aura { background: radial-gradient(circle, #c47840 0%, transparent 70%); }
  body[data-theme="geode"]    .aura { background: radial-gradient(circle, #8c5cd6 0%, transparent 70%); }
  body[data-theme="glowsand"] .aura { background: radial-gradient(circle, #40b8c8 0%, transparent 70%); }

  /* Stage holds vessel image + canvas overlay, both same size */
  .stage {
    position: absolute;
    z-index: 1;
    pointer-events: auto;
    transition: opacity 0.9s ease, transform 0.9s ease;
  }
  .sand-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    transition: transform 0.85s cubic-bezier(0.5,-0.1,0.5,1.1);
    will-change: transform;
  }
  .stage .sand-canvas       { transform: rotate(0deg); }
  .stage.is-flipped .sand-canvas { transform: rotate(180deg); }

  /* Theme switcher pill */
  .switcher {
    position: absolute;
    top: max(18px, env(safe-area-inset-top));
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 4px;
    padding: 4px;
    border-radius: 999px;
    background: rgba(0, 0, 0, 0.35);
    backdrop-filter: blur(14px) saturate(120%);
    -webkit-backdrop-filter: blur(14px) saturate(120%);
    border: 1px solid rgba(255, 255, 255, 0.06);
    box-shadow: 0 1px 8px rgba(0, 0, 0, 0.30);
    z-index: 10;
  }
  .switcher-btn {
    width: 36px; height: 36px; border: 0; background: transparent;
    border-radius: 999px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: rgba(232, 226, 210, 0.45);
    transition: color 0.32s ease, background 0.3s ease;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    padding: 0;
  }
  .switcher-btn:hover { color: rgba(232, 226, 210, 0.9); }
  .switcher-btn.is-active { background: rgba(255, 255, 255, 0.10); }
  .switcher-btn.is-active[data-theme="sahara"]   { color: #f7c890; }
  .switcher-btn.is-active[data-theme="geode"]    { color: #d4b0ff; }
  .switcher-btn.is-active[data-theme="glowsand"] { color: #80f8f8; }
  .switcher-btn svg { display: block; width: 20px; height: 20px; stroke-width: 1.6; fill: none; stroke: currentColor; stroke-linecap: round; stroke-linejoin: round; }

  .status {
    position: absolute;
    bottom: calc(max(20px, env(safe-area-inset-bottom)) + 12px);
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 11px;
    align-items: center;
    font-family: ui-monospace, "JetBrains Mono", monospace;
    font-size: 10.5px;
    letter-spacing: 0.22em;
    color: rgba(232, 220, 200, 0.50);
    pointer-events: none;
    z-index: 5;
    white-space: nowrap;
  }
  .status-sep { opacity: 0.5; }
  .poem {
    position: absolute;
    bottom: calc(max(20px, env(safe-area-inset-bottom)) + 38px);
    left: 50%;
    transform: translateX(-50%);
    font-family: "Cormorant Garamond", "Times New Roman", serif;
    font-style: italic;
    font-size: 15px;
    letter-spacing: 0.02em;
    color: rgba(232, 218, 188, 0.68);
    text-align: center;
    max-width: 86vw;
    pointer-events: none;
    z-index: 5;
    opacity: 0;
    transition: opacity 1.6s ease;
    line-height: 1.2;
  }
  .poem.is-visible { opacity: 1; }
  .hint {
    position: absolute;
    bottom: calc(max(20px, env(safe-area-inset-bottom)) + 70px);
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 7px;
    font-family: ui-monospace, "JetBrains Mono", monospace;
    font-size: 10px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: rgba(232, 220, 200, 0.65);
    pointer-events: none;
    z-index: 6;
    opacity: 0;
    transition: opacity 1.6s ease;
  }
  .hint.is-visible {
    opacity: 1;
    animation: hintBreathe 3.4s ease-in-out infinite;
  }
  .hint.is-gone { opacity: 0; animation: none; }
  @keyframes hintBreathe { 0%, 100% { opacity: 0.55; } 50% { opacity: 1; } }

  /* Fact card — persistent block above status; updated on each flip */
  .fact-card {
    position: absolute;
    bottom: calc(max(20px, env(safe-area-inset-bottom)) + 78px);
    left: 6%;
    right: 6%;
    text-align: center;
    pointer-events: none;
    z-index: 6;
    opacity: 0;
    transition: opacity 0.55s ease;
  }
  .fact-card.is-visible { opacity: 1; }
  .fact-card .fc-duration {
    font-family: "Cormorant Garamond", "Times New Roman", serif;
    font-weight: 400;
    font-size: 46px;
    letter-spacing: 0.04em;
    color: rgba(255, 234, 196, 0.97);
    text-shadow: 0 3px 22px rgba(0,0,0,0.55);
    line-height: 1.0;
    margin-bottom: 14px;
  }
  /* Theme-colored duration + body text. Body uses a softer/lower-alpha
     variant of the duration hue so it reads as the same family without
     competing for attention. */
  body[data-theme="geode"]    .fact-card .fc-duration { color: rgba(232, 210, 255, 0.97); text-shadow: 0 2px 18px rgba(40,10,80,0.55); }
  body[data-theme="glowsand"] .fact-card .fc-duration { color: rgba(200, 248, 250, 0.97); text-shadow: 0 2px 18px rgba(0,30,40,0.55); }

  .fact-card .fc-body {
    font-family: "Cormorant Garamond", "Times New Roman", serif;
    font-style: italic;
    font-size: 17px;
    line-height: 1.42;
    letter-spacing: 0.01em;
    color: rgba(232, 218, 188, 0.78);
    max-width: 560px;
    margin: 0 auto;
  }
  body[data-theme="geode"]    .fact-card .fc-body { color: rgba(212, 192, 240, 0.82); }
  body[data-theme="glowsand"] .fact-card .fc-body { color: rgba(184, 232, 240, 0.82); }
  /* Typewriter cursor — blinks while the fact body is still being revealed */
  .fact-card .fc-body.is-typing::after {
    content: '▏';
    margin-left: 1px;
    animation: hg-fc-cursor 0.7s steps(2) infinite;
    opacity: 0.85;
  }
  @keyframes hg-fc-cursor { 50% { opacity: 0; } }
  /* Sub-line hidden in the new sticky layout */
  .fact-card .fc-sub { display: none; }
  /* When the fact card is on, hide the wandering poem so the two don't share the slot */
  body.has-fact .poem { opacity: 0 !important; }

  /* Poster mode */
  body.is-poster .switcher,
  body.is-poster .hint,
  body.is-poster .poem,
  body.is-poster .fact-card,
  body.is-poster .status { display: none !important; }
  .poster-title {
    display: none;
    position: absolute;
    top: 10%;
    left: 0;
    right: 0;
    text-align: center;
    pointer-events: none;
    z-index: 6;
  }
  body.is-poster .poster-title { display: block; }
  .poster-title .pt-name {
    font-family: "Cormorant Garamond", "Times New Roman", serif;
    font-size: 100px;
    letter-spacing: 0.22em;
    font-weight: 400;
    color: rgba(240, 220, 180, 0.96);
    text-shadow: 0 4px 26px rgba(0,0,0,0.6);
    line-height: 1;
    text-transform: uppercase;
  }
</style>
</head>

  <div class="status" id="status">

    <span class="status-sep">·</span>
    <span class="status-temp" id="status-temp">—</span>
  </div>

<script>
'use strict';

// ============================================================
// I18N (zh / en, auto-detected, override via localStorage.game_locale)
// ============================================================
const LOCALE = (function() {
  const o = (typeof localStorage !== 'undefined') ? localStorage.getItem('game_locale') : null;
  if (o === 'zh' || o === 'en') return o;
  const nav = (typeof navigator !== 'undefined' && navigator.language) || '';
  return nav.toLowerCase().startsWith('zh') ? 'zh' : 'en';
})();
function t(obj) {
  if (obj == null) return '';
  if (typeof obj === 'string') return obj;
  return obj[LOCALE] || obj.en || obj.zh || '';
}

function nearestFactBucket(elapsedSec) {
  let best = FACT_BUCKETS[0];
  let bestDiff = Math.abs(elapsedSec - best);
  for (const b of FACT_BUCKETS) {
    const d = Math.abs(elapsedSec - b);
    if (d < bestDiff) { bestDiff = d; best = b; }
  }
  return best;
}
// Anti-repeat: each bucket keeps a sliding window of recently-shown facts.
// Capacity = floor(N/2) (capped to N-1 so we never starve the pool), and we
// prefer drawing from facts NOT in the window. Result: rapid taps that land in
// the same bucket cycle through the full set before any fact reappears,
// eliminating the "I just saw this 2 taps ago" feeling.
const _recentByBucket = {};
function pickFact(elapsedSec) {
  const bucket = nearestFactBucket(elapsedSec);
  const arr = FACTS[bucket] || [];
  if (arr.length === 0) return { bucket, fact: { en: '—', zh: '—' } };
  const cap = Math.min(arr.length - 1, Math.max(2, Math.floor(arr.length / 2)));
  const recent = _recentByBucket[bucket] || (_recentByBucket[bucket] = []);
  const fresh = arr.filter(f => !recent.includes(f));
  const pool = fresh.length > 0 ? fresh : arr;
  const fact = pool[Math.floor(Math.random() * pool.length)];
  recent.push(fact);
  while (recent.length > cap) recent.shift();
  return { bucket, fact };
}
// Duration label is always English regardless of UI locale — the timestamp is
// part of the visual identity ("20 SECONDS", "3 minutes", etc.).
function formatDurationLabel(sec) {
  if (sec === 1)  return '1 second';
  if (sec < 60)   return sec + ' seconds';
  if (sec < 120)  return '1 minute';
  if (sec < 3600) return Math.round(sec / 60) + ' minutes';
  return (sec / 3600).toFixed(1) + ' hours';
}
const FACT_INTRO = {
  en: 'In this span, the world quietly did this.',
  zh: '在这段时光里，世界悄悄做了这些。'
};

// ============================================================
// VESSEL GEOMETRY (canvas-drawn misty hourglass — choose freely)
// Stage is square. Hourglass sits centered, occupies ~80% height.
// Symmetric bulb chambers via cosine-bell profile.
// ============================================================
const FRAC = {
  cx:           0.500,
  capTop:       0.060,
  capBot:       0.940,
  upperTop:     0.085,    // top of upper chamber (just below cap)
  upperBot:     0.470,    // bottom of upper chamber
  neckTop:      0.470,
  neckBot:      0.530,
  lowerTop:     0.530,
  lowerBot:     0.915,
  neckHalfW:    0.018,
  maxHalfW:     0.165,    // chamber widest half-width (fraction of stage)
};

// halfW(t) bell curve from t=0 (chamber top) → t=1 (chamber bot, neck width).
// Bulb peaks around t=0.42 for the upper chamber.
function upperProfileHalfW(t) {
  // Smooth shape: starts at 0 (curving down from cap), peaks near t=0.42, narrows
  // to neckHalfW at t=1.
  const peakT = 0.42;
  if (t < peakT) {
    const u = t / peakT;       // 0..1
    // Smooth ease from 0 → 1
    const eased = 0.5 - 0.5 * Math.cos(Math.PI * u);
    return FRAC.maxHalfW * eased;
  } else {
    const u = (t - peakT) / (1 - peakT); // 0..1
    // From maxHalfW → neckHalfW
    const eased = 0.5 - 0.5 * Math.cos(Math.PI * u);
    return FRAC.maxHalfW + (FRAC.neckHalfW - FRAC.maxHalfW) * eased;
  }
}
function lowerProfileHalfW(t) {
  // Mirror of upper: at t=0 width=neckHalfW; peaks near t=0.58; t=1 width=0
  return upperProfileHalfW(1 - t);
}

// ============================================================
// CANVAS + STAGE SIZING
// ============================================================
const canvas = document.getElementById('sand');
const ctx = canvas.getContext('2d');
const stage = document.getElementById('stage');
const aura = document.getElementById('aura');
let W = 0, H = 0, DPR = 1;
let stageSize = 0, stageX = 0, stageY = 0;

function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;

  const poster = document.body.classList.contains('is-poster');
  const minDim = Math.min(W, H);
  if (poster) {
    stageSize = Math.min(minDim * 0.78, 900);
    stageX = (W - stageSize) / 2;
    stageY = H * 0.18;
  } else {
    stageSize = Math.min(minDim * 0.92, 760);
    if (stageSize > H * 0.78) stageSize = H * 0.78;
    stageX = (W - stageSize) / 2;
    stageY = (H - stageSize) / 2 - 24;
  }

  stage.style.left   = stageX + 'px';
  stage.style.top    = stageY + 'px';
  stage.style.width  = stageSize + 'px';
  stage.style.height = stageSize + 'px';

  canvas.width  = Math.floor(stageSize * DPR);
  canvas.height = Math.floor(stageSize * DPR);
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

  // Aura behind hourglass
  const auraSize = stageSize * 1.05;
  aura.style.width  = auraSize + 'px';
  aura.style.height = auraSize + 'px';
  aura.style.left   = (W / 2 - auraSize / 2) + 'px';
  aura.style.top    = (stageY + stageSize / 2 - auraSize / 2) + 'px';

  rebuildPiles();
}

// ============================================================
// CHAMBER WIDTH (piecewise linear interp on the profile)
// ============================================================
function chamberHalfW(yPx, isUpper) {
  const cTop = (isUpper ? FRAC.upperTop : FRAC.lowerTop) * stageSize;
  const cBot = (isUpper ? FRAC.upperBot : FRAC.lowerBot) * stageSize;
  if (yPx < cTop || yPx > cBot) return 0;
  const t = (yPx - cTop) / (cBot - cTop);
  const halfWFrac = isUpper ? upperProfileHalfW(t) : lowerProfileHalfW(t);
  return halfWFrac * stageSize;
}

// ============================================================
// COLUMN-BASED SAND PILE STATE
// ============================================================
const NUM_COLS = 36;
let COL_W = 0;
let GRAIN_H = 0;
let GRAIN_R = 0;
let cxPx = 0;

let topCols  = new Int16Array(NUM_COLS);
let botCols  = new Int16Array(NUM_COLS);
let topMax   = new Int16Array(NUM_COLS);
let botMax   = new Int16Array(NUM_COLS);
let topFloor = new Float32Array(NUM_COLS); // y where column's stack starts
let botFloor = new Float32Array(NUM_COLS);
// Float "display" heights used by the renderer. Normally just mirrors topCols/
// botCols so single-grain drains and avalanche shifts stay crisp. **During a
// post-flip settle animation** they ease from the pre-flatten shape to the
// flattened target over SETTLE_ANIM_MS — this is the only place we deliberately
// decouple display from sim, so the swap-into-flat transition reads as a
// smooth morph instead of a snap. Normal flow is unaffected.
let topDisp  = new Float32Array(NUM_COLS);
let botDisp  = new Float32Array(NUM_COLS);
let topFrom  = new Float32Array(NUM_COLS); // settle-anim "from" snapshot
let botFrom  = new Float32Array(NUM_COLS);
const SETTLE_ANIM_MS = 380;
let settleAnimMs = 0;
// Flip-burst overlay timer — counts down while the radial impact ring + core
// flash + chamber-clipped glow are visible just after triggerFlip.
const FLIP_BURST_MS = 600;
let flipBurstT = 0;
let totalGrains = 0;

function pickCycleDuration() {
  cycleTargetSec = DURATION_POOL[Math.floor(Math.random() * DURATION_POOL.length)];
}

function rebuildPiles() {
  cxPx = FRAC.cx * stageSize;
  const maxHWPx = FRAC.maxHalfW * stageSize;
  COL_W   = (2 * maxHWPx) / NUM_COLS;
  GRAIN_H = COL_W * 0.78;
  GRAIN_R = COL_W * 0.62;

  topCols  = new Int16Array(NUM_COLS);
  botCols  = new Int16Array(NUM_COLS);
  topMax   = new Int16Array(NUM_COLS);
  botMax   = new Int16Array(NUM_COLS);
  topFloor = new Float32Array(NUM_COLS);
  botFloor = new Float32Array(NUM_COLS);
  topDisp  = new Float32Array(NUM_COLS);
  botDisp  = new Float32Array(NUM_COLS);
  topFrom  = new Float32Array(NUM_COLS);
  botFrom  = new Float32Array(NUM_COLS);
  settleAnimMs = 0;

  let sum = 0;
  for (let i = 0; i < NUM_COLS; i++) {
    const xLocal = (i - (NUM_COLS - 1) / 2) * COL_W;
    const tb = computeStackBounds(xLocal, true);
    const bb = computeStackBounds(xLocal, false);
    topFloor[i] = tb.floor;
    topMax[i]   = tb.max;
    botFloor[i] = bb.floor;
    botMax[i]   = bb.max;
    topCols[i]  = topMax[i];
    botCols[i]  = 0;
    sum += topMax[i];
  }
  totalGrains = sum;
  inFlight.length = 0;
  drainAccum = 0;
  avalAccum = 0;
  emptyTimer = 0;
  // Re-derive drain rate from chosen cycle target duration
  DRAIN_INTERVAL_MS = Math.max(20, (cycleTargetSec * 1000) / Math.max(1, totalGrains));
  drainStartTime = (typeof performance !== 'undefined' ? performance.now() : Date.now());
  cyclePhase = 'draining';
}

function computeStackBounds(xLocal, isUpper) {
  // A column at xLocal can hold grains in the vertical range where the chamber
  // wall half-width is >= |xLocal|. The "floor" is the largest y in that range
  // (physically lowest), where the stack starts. Max grain count = vertical
  // range / GRAIN_H.
  const absX = Math.abs(xLocal);
  const cTop = (isUpper ? FRAC.upperTop : FRAC.lowerTop) * stageSize;
  const cBot = (isUpper ? FRAC.upperBot : FRAC.lowerBot) * stageSize;
  const step = Math.max(0.5, GRAIN_H * 0.25);
  // Find yFloor: largest y where halfW(y) >= absX
  let yFloor = cBot;
  while (yFloor > cTop && chamberHalfW(yFloor, isUpper) < absX + 0.6) {
    yFloor -= step;
  }
  // Find yCeil: smallest y where halfW(y) >= absX
  let yCeil = cTop;
  while (yCeil < cBot && chamberHalfW(yCeil, isUpper) < absX + 0.6) {
    yCeil += step;
  }
  if (yFloor <= yCeil) return { floor: yFloor, max: 0 };
  const max = Math.max(0, Math.floor((yFloor - yCeil) / GRAIN_H) - 1);
  return { floor: yFloor, max };
}

// ============================================================
// IN-FLIGHT GRAINS + DUST
// ============================================================
const inFlight = []; // {x, y, vx, vy, hue, size}
const dust = [];     // {x, y, vx, vy, life, max, hue}
const sparkles = []; // tap sparkles {x, y, vx, vy, life, max}

function spawnStreamGrain() {
  const neckTopPx = FRAC.neckTop * stageSize;
  const neckHWPx  = FRAC.neckHalfW * stageSize;
  inFlight.push({
    x: cxPx + (Math.random() - 0.5) * neckHWPx * 1.2,
    y: neckTopPx + 1,
    vx: (Math.random() - 0.5) * 18,
    vy: 70 + Math.random() * 40,
    hueIdx: Math.floor(Math.random() * 5),
    size: GRAIN_R * (0.85 + Math.random() * 0.3),
    landIn: 'bot',
  });
}


function spawnDust(x, y, theme) {
  for (let i = 0; i < 3; i++) {
    dust.push({
      x: x + (Math.random() - 0.5) * COL_W,
      y: y - 2,
      vx: (Math.random() - 0.5) * 36,
      vy: -10 - Math.random() * 38,
      life: 0,
      max: 280 + Math.random() * 240,
    });
  }
}
function spawnSparkle(x, y) {
  for (let i = 0; i < 6; i++) {
    sparkles.push({
      x: x + (Math.random() - 0.5) * 8,
      y: y + (Math.random() - 0.5) * 8,
      vx: (Math.random() - 0.5) * 40,
      vy: -10 - Math.random() * 40,
      life: 0,
      max: 600 + Math.random() * 400,
    });
  }
}
function drawFlipBurst(theme) {
  // Three layered effects driven by flipBurstT (which decays from FLIP_BURST_MS
  // → 0 just after triggerFlip): a chamber-clipped warm glow that brightens the
  // inside of the vessel briefly, a central core flash that pops then fades, and
  // an expanding shockwave ring that travels outward. All additive so they sit
  // on top of the existing scene without dirtying it.
  if (flipBurstT <= 0) return;
  const t = 1 - flipBurstT / FLIP_BURST_MS; // 0 (just triggered) → 1 (done)
  const glow = theme.sandGlow;
  const setA = (a) => glow.replace(/[\d.]+\)$/, a.toFixed(3) + ')');
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';

  // (1) Chamber-clipped tint pulse — brightens vessel interior briefly
  const tintA = Math.pow(1 - t, 2) * 0.35;
  if (tintA > 0.01) {
    pathHourglassOutline();
    ctx.save();
    ctx.clip();
    const g1 = ctx.createRadialGradient(cxPx, stageSize / 2, 0, cxPx, stageSize / 2, stageSize * 0.45);
    g1.addColorStop(0, setA(tintA));
    g1.addColorStop(1, setA(0));
    ctx.fillStyle = g1;
    ctx.fillRect(0, 0, stageSize, stageSize);
    ctx.restore();
  }

  // (2) Core flash — sharp pop at center, mostly visible in first 40%
  const coreT = Math.min(1, t * 4);
  const coreA = Math.max(0, Math.pow(1 - t * 2.5, 2)) * 1.0;
  if (coreA > 0.02) {
    const coreR = GRAIN_R * (3 + coreT * 7);
    const g2 = ctx.createRadialGradient(cxPx, stageSize / 2, 0, cxPx, stageSize / 2, coreR);
    g2.addColorStop(0, setA(Math.min(1, coreA)));
    g2.addColorStop(0.4, setA(coreA * 0.4));
    g2.addColorStop(1, setA(0));
    ctx.fillStyle = g2;
    ctx.fillRect(cxPx - coreR, stageSize / 2 - coreR, coreR * 2, coreR * 2);
  }

  // (3) Expanding shockwave ring — travels outward, fades on the way
  const ringR = stageSize * 0.55 * (1 - Math.pow(1 - t, 2.5));
  const ringA = Math.pow(1 - t, 2.2) * 0.6;
  if (ringA > 0.02 && ringR > GRAIN_R) {
    const ringW = GRAIN_R * 1.8;
    const inner = Math.max(0, ringR - ringW);
    const outer = ringR + ringW;
    const g3 = ctx.createRadialGradient(cxPx, stageSize / 2, inner, cxPx, stageSize / 2, outer);
    g3.addColorStop(0, setA(0));
    g3.addColorStop(0.5, setA(ringA));
    g3.addColorStop(1, setA(0));
    ctx.fillStyle = g3;
    ctx.beginPath();
    ctx.arc(cxPx, stageSize / 2, outer, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();
}

function mirrorParticles() {
  // Reflect (x,y) and (vx,vy) of every persistent particle through the canvas
  // center (stageSize/2, stageSize/2). Pairs with the canvasRotated toggle in
  // finishFlip so the visible screen positions stay continuous. In-flight
  // grains are included so they finish their fall instead of vanishing.
  const reflect = (arr) => {
    for (const p of arr) {
      p.x = stageSize - p.x;
      p.y = stageSize - p.y;
      if (p.vx !== undefined) p.vx = -p.vx;
      if (p.vy !== undefined) p.vy = -p.vy;
    }
  };
  reflect(motes);
  reflect(dust);
  reflect(sparkles);
  reflect(inFlight);
}

function spawnFlipBurst() {
  // Increased from 28 to 60 sparkles, faster outward velocity, slightly longer
  // life — pairs with the radial shockwave ring so the user sees both a wash
  // of energy from the center and the discrete glitter of individual particles.
  for (let i = 0; i < 60; i++) {
    const a = Math.random() * Math.PI * 2;
    const r = Math.random() * 36;
    const speed = 90 + Math.random() * 140;
    sparkles.push({
      x: cxPx + Math.cos(a) * r,
      y: stageSize / 2 + Math.sin(a) * r,
      vx: Math.cos(a) * speed,
      vy: Math.sin(a) * speed,
      px: cxPx + Math.cos(a) * r,
      py: stageSize / 2 + Math.sin(a) * r,
      life: 0,
      max: 800 + Math.random() * 600,
    });
  }
}

// ============================================================
// DRAIN + AVALANCHE
// ============================================================
// Each cycle has a randomly-chosen target drain duration.
// DRAIN_INTERVAL_MS = targetSeconds * 1000 / totalTopGrains.
const DURATION_POOL = [20, 30, 45, 60, 90, 120, 180]; // seconds, picked random per cycle
let cycleTargetSec = 60;
let DRAIN_INTERVAL_MS = 75;
const AVALANCHE_INTERVAL_MS = 24;
const SLOPE_THRESHOLD = 1;
const POST_EMPTY_PAUSE_MS = 600;       // brief settle after drain before showing fact
const FACT_DISPLAY_MS = 5400;          // how long the fact card stays up

let drainAccum = 0;
let avalAccum = 0;
let emptyTimer = 0;
let drainStartTime = 0;                // perf timestamp when current cycle started

function tickDrain(dt) {
  if (cyclePhase !== 'draining') return;
  drainAccum += dt;
  while (drainAccum >= DRAIN_INTERVAL_MS) {
    drainAccum -= DRAIN_INTERVAL_MS;
    // Pop from the lowest non-empty column nearest center
    const ci = Math.floor(NUM_COLS / 2);
    let drainIdx = -1;
    for (let r = 0; r <= NUM_COLS / 2; r++) {
      const a = ci - r, b = ci + r;
      if (a >= 0 && topCols[a] > 0) { drainIdx = a; break; }
      if (b < NUM_COLS && b !== a && topCols[b] > 0) { drainIdx = b; break; }
    }
    if (drainIdx < 0) return;
    topCols[drainIdx]--;
    spawnStreamGrain();
  }
}

function avalanche(cols, maxes) {
  // Multi-pass settle until stable (capped). Two-direction sweep per outer pass
  // avoids any left/right bias accumulating into a tilt.
  for (let pass = 0; pass < 12; pass++) {
    let moved = false;
    for (let i = 0; i < cols.length - 1; i++) moved = slidePair(cols, maxes, i, i+1) || moved;
    for (let i = cols.length - 2; i >= 0; i--) moved = slidePair(cols, maxes, i, i+1) || moved;
    if (!moved) break;
  }
}
function slidePair(cols, maxes, i, j, threshold) {
  const t = (threshold === undefined) ? SLOPE_THRESHOLD : threshold;
  const diff = cols[i] - cols[j];
  if (diff > t && cols[j] < maxes[j]) {
    cols[i]--; cols[j]++;
    return true;
  }
  if (diff < -t && cols[i] < maxes[i]) {
    cols[i]++; cols[j]--;
    return true;
  }
  return false;
}

// One-shot full-flatten — used right after the post-flip swap. Threshold 0 means
// any 1-grain column-height difference flows downhill, so the "central crater"
// shape inherited from the previous chamber (drained-from-middle) collapses to a
// physically-plausible level pile with center bulge wherever maxes allow.
function flatten(cols, maxes) {
  for (let pass = 0; pass < 60; pass++) {
    let moved = false;
    for (let i = 0; i < cols.length - 1; i++) moved = slidePair(cols, maxes, i, i+1, 0) || moved;
    for (let i = cols.length - 2; i >= 0; i--) moved = slidePair(cols, maxes, i, i+1, 0) || moved;
    if (!moved) break;
  }
}

function tickAvalanche(dt) {
  avalAccum += dt;
  if (avalAccum < AVALANCHE_INTERVAL_MS) return;
  avalAccum = 0;
  avalanche(topCols, topMax);
  avalanche(botCols, botMax);
}

function tickDisplay(dt) {
  // Renderer reads topDisp / botDisp. Normally they track cols exactly so the
  // visual is grain-accurate. During a settle anim (set in finishFlip), they
  // ease from the post-swap-pre-flatten snapshot to the flattened cols, so the
  // user sees the V-shape collapse smoothly instead of snapping.
  if (settleAnimMs > 0) {
    settleAnimMs -= dt;
    const t = settleAnimMs <= 0 ? 1 : 1 - settleAnimMs / SETTLE_ANIM_MS;
    const e = 1 - Math.pow(1 - t, 3); // ease-out cubic: fast start, gentle land
    for (let i = 0; i < NUM_COLS; i++) {
      topDisp[i] = topFrom[i] + (topCols[i] - topFrom[i]) * e;
      botDisp[i] = botFrom[i] + (botCols[i] - botFrom[i]) * e;
    }
    if (settleAnimMs <= 0) {
      settleAnimMs = 0;
      for (let i = 0; i < NUM_COLS; i++) {
        topDisp[i] = topCols[i];
        botDisp[i] = botCols[i];
      }
    }
    return;
  }
  for (let i = 0; i < NUM_COLS; i++) {
    topDisp[i] = topCols[i];
    botDisp[i] = botCols[i];
  }
}

// ============================================================
// IN-FLIGHT STEP
// ============================================================
function stepInFlight(dt, theme) {
  const dts = dt / 1000;
  const gxv = gravityRef.x * 1200;
  const gyv = gravityRef.y * 1200;
  const neckHWPx = FRAC.neckHalfW * stageSize - 0.5;
  const neckTopPx = FRAC.neckTop * stageSize;
  const neckBotPx = FRAC.neckBot * stageSize;
  const ucBotPx = FRAC.upperBot * stageSize;

  for (let i = inFlight.length - 1; i >= 0; i--) {
    const p = inFlight[i];
    p.vx += gxv * dts;
    p.vy += gyv * dts;
    p.vx *= 0.992;
    p.x += p.vx * dts;
    p.y += p.vy * dts;

    // Neck constraint while inside neck region
    if (p.y > neckTopPx - 1 && p.y < neckBotPx + 1) {
      const dxC = p.x - cxPx;
      if (dxC > neckHWPx)  { p.x = cxPx + neckHWPx;  p.vx = -Math.abs(p.vx) * 0.35; }
      if (dxC < -neckHWPx) { p.x = cxPx - neckHWPx;  p.vx =  Math.abs(p.vx) * 0.35; }
    }

    const landIn = p.landIn || 'bot';

    // ---- TOP-CHAMBER RAIN: grain falls inside upper chamber, settles on top pile
    if (landIn === 'top' && p.y < ucBotPx + 4) {
      // Clamp within upper-chamber walls
      const hwHere = chamberHalfW(p.y, true);
      if (hwHere > 0) {
        const dxC = p.x - cxPx;
        if (Math.abs(dxC) > hwHere - GRAIN_R) {
          p.x = cxPx + Math.sign(dxC) * (hwHere - GRAIN_R);
          p.vx *= -0.3;
        }
      }
      const xLocal = p.x - cxPx;
      let colIdx = Math.round(xLocal / COL_W + (NUM_COLS - 1) / 2);
      colIdx = Math.max(0, Math.min(NUM_COLS - 1, colIdx));
      const stackTopY = topFloor[colIdx] - topCols[colIdx] * GRAIN_H - GRAIN_H * 0.5;
      if (p.y >= stackTopY) {
        const placedCol = placeInChamber(topCols, topMax, colIdx);
        if (placedCol >= 0) {
          spawnDust(p.x, stackTopY, theme);
          playImpactPing();
        }
        inFlight.splice(i, 1);
        continue;
      }
    }

    // ---- BOT-LANDING: drain stream after neck, or post-flip rain in new bottom
    else if (p.y > neckBotPx) {
      const hwHere = chamberHalfW(p.y, false);
      if (hwHere > 0) {
        const dxC = p.x - cxPx;
        if (Math.abs(dxC) > hwHere - GRAIN_R) {
          p.x = cxPx + Math.sign(dxC) * (hwHere - GRAIN_R);
          p.vx *= -0.3;
        }
      }
      const xLocal = p.x - cxPx;
      let colIdx = Math.round(xLocal / COL_W + (NUM_COLS - 1) / 2);
      colIdx = Math.max(0, Math.min(NUM_COLS - 1, colIdx));
      const stackTopY = botFloor[colIdx] - botCols[colIdx] * GRAIN_H - GRAIN_H * 0.5;
      if (p.y >= stackTopY) {
        const placedCol = placeInChamber(botCols, botMax, colIdx);
        if (placedCol >= 0) {
          spawnDust(p.x, stackTopY, theme);
          playImpactPing();
        }
        inFlight.splice(i, 1);
        continue;
      }
    }

    // OOB
    if (p.y > stageSize * 1.1 || p.y < -stageSize * 0.1 || Math.abs(p.x - cxPx) > stageSize) {
      inFlight.splice(i, 1);
    }
  }
}

function placeInChamber(cols, maxes, colIdx) {
  if (cols[colIdx] < maxes[colIdx]) {
    cols[colIdx]++;
    return colIdx;
  }
  for (const a of [colIdx - 1, colIdx + 1]) {
    if (a >= 0 && a < NUM_COLS && cols[a] < maxes[a]) {
      cols[a]++;
      return a;
    }
  }
  return -1;
}

function stepDust(dt) {
  const dts = dt / 1000;
  for (let i = dust.length - 1; i >= 0; i--) {
    const d = dust[i];
    d.life += dt;
    if (d.life > d.max) { dust.splice(i, 1); continue; }
    d.vy += 220 * dts;
    d.vx *= 0.95;
    d.x += d.vx * dts;
    d.y += d.vy * dts;
  }
}
function stepSparkles(dt) {
  const dts = dt / 1000;
  for (let i = sparkles.length - 1; i >= 0; i--) {
    const s = sparkles[i];
    s.life += dt;
    if (s.life > s.max) { sparkles.splice(i, 1); continue; }
    // Capture previous position for the motion trail before integrating physics.
    s.px = s.x;
    s.py = s.y;
    s.vy += 220 * dts;
    s.vx *= 0.96;
    s.x += s.vx * dts;
    s.y += s.vy * dts;
  }
}

// ============================================================
// CYCLE PHASE MACHINE
//   draining → flipping → draining (next)
// Fact card lives outside the phase machine — it updates atomically
// at flip-trigger time and stays visible until the next flip.
// ============================================================
let cyclePhase = 'draining'; // 'draining' | 'flipping'
let phaseTimer = 0;

function tickAutoFlip(dt) {
  if (cyclePhase !== 'draining') return;
  let topSum = 0;
  for (let i = 0; i < NUM_COLS; i++) topSum += topCols[i];
  if (topSum === 0 && inFlight.length === 0) {
    emptyTimer += dt;
    if (emptyTimer > POST_EMPTY_PAUSE_MS) {
      triggerFlip();
    }
  } else {
    emptyTimer = 0;
  }
}

function tickCycle(dt) {
  if (cyclePhase === 'flipping') {
    phaseTimer += dt;
    if (phaseTimer >= FLIP_DURATION_MS) finishFlip();
  }
}

function triggerFlip() {
  // Allowed any time we're not mid-flip already. Updates the fact card
  // (atomic content swap) and starts the visual rotation immediately —
  // sand sim keeps running, so the new top picks up right away.
  if (cyclePhase === 'flipping') return;
  const elapsedSec = ((typeof performance !== 'undefined' ? performance.now() : Date.now()) - drainStartTime) / 1000;
  updateFactCard(elapsedSec);
  hideHint();
  spawnFlipBurst();
  playFlipSound();
  flipBurstT = FLIP_BURST_MS; // arm the radial/core glow overlay for ~600ms
  // CSS rotation toggles NOW — this animates the visible spin over FLIP_DURATION_MS
  cssRotated = !cssRotated;
  stage.classList.toggle('is-flipped', cssRotated);
  cyclePhase = 'flipping';
  phaseTimer = 0;
}

// ============================================================
// FLIP (visual + state swap)
// ============================================================
const FLIP_DURATION_MS = 850;
let flipState = { active: false, t: 0 }; // legacy, kept for spawnFlipBurst calls
let cssRotated = false;     // CSS rotation state — toggles at flip *start* so the
                            //   animation plays. The visible rotation = this only.
let canvasRotated = false;  // Canvas internal 180° transform — toggles at flip
                            //   *end* together with sim state swap. Net effect:
                            //   sim coord "top" always appears at screen top after
                            //   the rotation animation settles.

function startFlip() {
  // Public entry point — user tap, sensor flip, auto-empty all funnel here.
  triggerFlip();
}
function finishFlip() {
  // Swap chamber counts — what was the bottom is now the top. Crucially we
  // do NOT swap topMax / botMax / topFloor / botFloor: those are chamber-
  // geometry-specific (where the pile rests, max stack per column inside the
  // bulb). Since both chambers have mirror-symmetric profiles, the swapped
  // column counts are valid heights inside the new chamber.
  const t = topCols;
  topCols = botCols;
  botCols = t;

  // Cap any column that exceeds its new chamber's max (shouldn't happen with
  // symmetric profile, but safe).
  for (let i = 0; i < NUM_COLS; i++) {
    if (topCols[i] > topMax[i]) topCols[i] = topMax[i];
    if (botCols[i] > botMax[i]) botCols[i] = botMax[i];
  }

  // Snapshot the post-swap-pre-flatten shape — this is the "from" frame the
  // renderer will ease away from over SETTLE_ANIM_MS. Without it the V-shape
  // crater in new-bot would snap to flat in a single frame.
  for (let i = 0; i < NUM_COLS; i++) {
    topFrom[i] = topCols[i];
    botFrom[i] = botCols[i];
  }
  // Eliminate the inherited central-crater shape in one shot — pre-flip top
  // was drained from center, and after swap that V would sit in new bot as
  // "sand piled at edges, valley in middle". flatten() levels both chambers
  // with zero-slope tolerance, and the renderer eases from snapshot → flat.
  flatten(topCols, topMax);
  flatten(botCols, botMax);
  settleAnimMs = SETTLE_ANIM_MS;

  let topCarry = 0;
  for (let i = 0; i < NUM_COLS; i++) topCarry += topCols[i];

  // Persistent particle arrays (motes, dust, sparkles, in-flight grains) store
  // positions in canvas-code coordinates. Without the canvasRotated transform
  // they render at screen position (W-x, H-y); with it they render at (x, y).
  // The instant canvasRotated toggles below, every particle's *screen* position
  // would teleport to the diagonally-opposite point — a few dozen particles all
  // jumping at once reads as a clear "flash" at the end of the rotation.
  // Mirror each particle's position AND velocity through the canvas center so
  // the displayed screen position and motion vector are continuous across the
  // toggle.
  mirrorParticles();
  drainAccum = 0;
  emptyTimer = 0;
  phaseTimer = 0;
  flipState = { active: false, t: 0 };
  // Canvas internal rotation toggles HERE — paired with the sim state swap
  // above. The CSS rotation finished its animation; from this frame on, the
  // canvas content is drawn 180°-pre-rotated so that CSS × canvas = identity.
  canvasRotated = !canvasRotated;
  pickCycleDuration();
  DRAIN_INTERVAL_MS = Math.max(20, (cycleTargetSec * 1000) / Math.max(1, topCarry || totalGrains));
  drainStartTime = (typeof performance !== 'undefined' ? performance.now() : Date.now());
  cyclePhase = 'draining';
}
function refillFromCenter(cols, maxes, count) {
  // Greedy: while count > 0, add 1 to the column with the *lowest* current
  // height (preferring center on ties). Naturally builds a flat-then-curving
  // pile that respects max height.
  let safety = 5000;
  const ci = Math.floor(NUM_COLS / 2);
  while (count > 0 && safety-- > 0) {
    // Find min height with room
    let minH = Infinity, minIdx = -1;
    for (let r = 0; r <= NUM_COLS / 2; r++) {
      for (const i of [ci - r, ci + r]) {
        if (i < 0 || i >= NUM_COLS || i === minIdx) continue;
        if (cols[i] >= maxes[i]) continue;
        if (cols[i] < minH) { minH = cols[i]; minIdx = i; }
      }
    }
    if (minIdx < 0) break;
    cols[minIdx]++;
    count--;
  }
}

// ============================================================
// RENDER
// ============================================================
function rgbaWithAlpha(rgba, newAlpha) {
  // input like 'rgba(160, 248, 248, 0.22)' or 'rgba(...)'
  return rgba.replace(/[\d.]+\)$/, newAlpha + ')');
}

function frame(now) {
  if (!lastFrameTime) lastFrameTime = now;
  const dt = Math.min(40, now - lastFrameTime);
  lastFrameTime = now;

  // smooth gravity
  gravityRef.x += (gravityRaw.x - gravityRef.x) * 0.18;
  gravityRef.y += (gravityRaw.y - gravityRef.y) * 0.18;

  const theme = THEMES[currentTheme];
  tickDrain(dt);
  stepInFlight(dt, theme);
  tickAvalanche(dt);
  tickDisplay(dt);
  if (flipBurstT > 0) flipBurstT = Math.max(0, flipBurstT - dt);
  stepDust(dt);
  stepSparkles(dt);
  stepMotes(dt);
  tickCycle(dt);
  tickAutoFlip(dt);
  tickAudio();

  render(theme);
  requestAnimationFrame(frame);
}

function render(theme) {
  ctx.clearRect(0, 0, stageSize, stageSize);

  // Compensate CSS rotation: when canvasRotated, pre-rotate the canvas content
  // by 180° so the CSS × canvas transform is identity. This keeps sim's "top"
  // chamber visually at screen top across any number of flips.
  if (canvasRotated) {
    ctx.save();
    ctx.translate(stageSize, stageSize);
    ctx.scale(-1, -1);
  }

  // Burst shockwave distortion — while the flip-burst ring is expanding, every
  // particle whose distance-from-center is within BURST_BAND of the current
  // ring radius gets pushed radially outward by a bell-shaped amount. Visual
  // only (not applied to physics); particles snap back to their natural
  // trajectory as the wave passes them by.
  const burstActive = flipBurstT > 0;
  const burstT = burstActive ? 1 - flipBurstT / FLIP_BURST_MS : 0;
  const burstRingR = burstActive ? stageSize * 0.55 * (1 - Math.pow(1 - burstT, 2.5)) : -1;
  const BURST_BAND = GRAIN_R * 6;
  const BURST_PUSH = GRAIN_R * 4.2;
  const stageMid = stageSize / 2;
  function burstPushXY(x, y) {
    if (!burstActive) return [x, y];
    const ox = x - cxPx, oy = y - stageMid;
    const d = Math.hypot(ox, oy);
    if (d < 0.001) return [x, y];
    const delta = d - burstRingR;
    if (Math.abs(delta) > BURST_BAND) return [x, y];
    const u = 1 - Math.abs(delta) / BURST_BAND; // 0..1 bell peaking at the ring
    const f = (u * BURST_PUSH) / d;
    return [x + ox * f, y + oy * f];
  }

  // Order matters: atmosphere behind everything, then vessel chamber tint,
  // then sand piles, then stream/dust, then glass outline glow on top.
  drawAtmosphere(theme, burstPushXY);
  drawChamberTint(theme);

  if (theme.additive) ctx.globalCompositeOperation = 'lighter';

  // Sand piles
  drawColumns(theme, topDisp, topFloor);
  drawColumns(theme, botDisp, botFloor);

  // In-flight stream
  for (let i = 0; i < inFlight.length; i++) {
    const p = inFlight[i];
    const [px, py] = burstPushXY(p.x, p.y);
    drawGrain(theme, px, py, p.size, p.hueIdx);
  }

  // Dust
  for (let i = 0; i < dust.length; i++) {
    const d = dust[i];
    const u = d.life / d.max;
    const a = (1 - u) * 0.55;
    const [dx, dy] = burstPushXY(d.x, d.y);
    ctx.fillStyle = theme.impactDust;
    ctx.globalAlpha = a;
    ctx.beginPath();
    ctx.arc(dx, dy, GRAIN_R * (0.6 + u * 0.4), 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Sparkles (tap + flip burst) — each rendered twice: a faint ghost at the
  // previous position (motion trail) plus the bright head at the current pos.
  // The trail makes the flip burst feel more energetic without changing count.
  for (let i = 0; i < sparkles.length; i++) {
    const s = sparkles[i];
    const u = s.life / s.max;
    const a = (1 - u) * 0.85;
    const r = GRAIN_R * (1.05 + u * 1.2);
    ctx.fillStyle = theme.sandPalette[3];
    if (s.px !== undefined) {
      const [tx, ty] = burstPushXY(s.px, s.py);
      ctx.globalAlpha = a * 0.35;
      ctx.beginPath();
      ctx.arc(tx, ty, r * 0.85, 0, Math.PI * 2);
      ctx.fill();
    }
    const [hx, hy] = burstPushXY(s.x, s.y);
    ctx.globalAlpha = a;
    ctx.beginPath();
    ctx.arc(hx, hy, r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  ctx.globalCompositeOperation = 'source-over';

  // Flip-burst overlay — radial impact ring + core flash + chamber tint pulse.
  // Sits *above* the sand/sparkles so it reads as energy flooding the vessel,
  // but *below* the glass outline so the silhouette stays crisp.
  drawFlipBurst(theme);

  // Misty glass outline + cap rings on top — the "vessel"
  drawVesselOutline(theme);
  drawCapRings(theme);

  if (window.__renderDebugOutline) drawDebugChamberOutline();

  if (canvasRotated) ctx.restore();
}

// ============================================================
// MISTY VESSEL RENDERING (canvas-drawn, atmospheric)
// ============================================================
function pathHourglassOutline() {
  // Walk both chambers' walls into one closed path.
  const ucTop = FRAC.upperTop * stageSize;
  const ucBot = FRAC.upperBot * stageSize;
  const lcTop = FRAC.lowerTop * stageSize;
  const lcBot = FRAC.lowerBot * stageSize;
  const STEP = 2;
  ctx.beginPath();
  // Upper left wall (top → bot)
  for (let y = ucTop; y <= ucBot; y += STEP) {
    const hw = chamberHalfW(y, true);
    if (y === ucTop) ctx.moveTo(cxPx - hw, y);
    else ctx.lineTo(cxPx - hw, y);
  }
  // Lower left wall (top → bot)
  for (let y = lcTop; y <= lcBot; y += STEP) {
    const hw = chamberHalfW(y, false);
    ctx.lineTo(cxPx - hw, y);
  }
  // Cross bottom
  ctx.lineTo(cxPx + chamberHalfW(lcBot, false), lcBot);
  // Lower right wall (bot → top)
  for (let y = lcBot; y >= lcTop; y -= STEP) {
    const hw = chamberHalfW(y, false);
    ctx.lineTo(cxPx + hw, y);
  }
  // Upper right wall (bot → top)
  for (let y = ucBot; y >= ucTop; y -= STEP) {
    const hw = chamberHalfW(y, true);
    ctx.lineTo(cxPx + hw, y);
  }
  ctx.closePath();
}

function drawChamberTint(theme) {
  // Soft inner haze + curved light catches, all clipped inside the chamber.
  pathHourglassOutline();
  ctx.save();
  ctx.clip();

  // 1) Radial glow centered on chamber middle (the base tint)
  const midY = stageSize * 0.5;
  const g = ctx.createRadialGradient(cxPx, midY, 0, cxPx, midY, stageSize * 0.45);
  g.addColorStop(0, theme.vesselTint);
  g.addColorStop(0.5, theme.vesselTint.replace(/[\d.]+\)$/, '0.03)'));
  g.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, stageSize, stageSize);

  // 2) Soft curved highlights — two per chamber. They sit just inside the
  // wall, follow the curve, and use a radial gradient with low alpha so the
  // edges feather out (no hard specular). 'lighter' blending lets them
  // brighten without dirtying the underlying tint.
  ctx.globalCompositeOperation = 'lighter';
  const upperMid = ((FRAC.upperTop + FRAC.upperBot) / 2) * stageSize;
  const lowerMid = ((FRAC.lowerTop + FRAC.lowerBot) / 2) * stageSize;

  drawGlassCatch(theme, cxPx - 0.052 * stageSize, upperMid - 0.005 * stageSize, 0.018 * stageSize, 0.122 * stageSize,  0.05, 0.62);
  drawGlassCatch(theme, cxPx + 0.046 * stageSize, upperMid + 0.020 * stageSize, 0.011 * stageSize, 0.068 * stageSize, -0.04, 0.38);
  drawGlassCatch(theme, cxPx - 0.052 * stageSize, lowerMid + 0.005 * stageSize, 0.018 * stageSize, 0.122 * stageSize, -0.05, 0.62);
  drawGlassCatch(theme, cxPx + 0.046 * stageSize, lowerMid - 0.020 * stageSize, 0.011 * stageSize, 0.068 * stageSize,  0.04, 0.38);

  // 3) A subtle horizontal "shoulder" highlight at the chamber's widest point,
  // suggesting the curve catching ambient light.
  const peakUpperY = (FRAC.upperTop + (FRAC.upperBot - FRAC.upperTop) * 0.42) * stageSize;
  const peakLowerY = (FRAC.lowerTop + (FRAC.lowerBot - FRAC.lowerTop) * 0.58) * stageSize;
  drawShoulderGlow(theme, peakUpperY, 0.22);
  drawShoulderGlow(theme, peakLowerY, 0.22);

  ctx.restore();
}

function drawGlassCatch(theme, cx, cy, rx, ry, rot, peakAlpha) {
  // Elongated soft highlight using a radial gradient.
  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, ry);
  grad.addColorStop(0,    theme.capAccent.replace(/[\d.]+\)$/, peakAlpha.toFixed(2) + ')'));
  grad.addColorStop(0.45, theme.capAccent.replace(/[\d.]+\)$/, (peakAlpha * 0.42).toFixed(3) + ')'));
  grad.addColorStop(0.78, theme.capAccent.replace(/[\d.]+\)$/, (peakAlpha * 0.12).toFixed(3) + ')'));
  grad.addColorStop(1,    'rgba(255,255,255,0)');
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(rot);
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.ellipse(0, 0, rx, ry, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawShoulderGlow(theme, y, peakAlpha) {
  // Wide flat shimmer across the chamber widest point.
  const grad = ctx.createRadialGradient(cxPx, y, 0, cxPx, y, stageSize * 0.20);
  grad.addColorStop(0,    theme.capAccent.replace(/[\d.]+\)$/, peakAlpha.toFixed(2) + ')'));
  grad.addColorStop(0.55, theme.capAccent.replace(/[\d.]+\)$/, (peakAlpha * 0.18).toFixed(3) + ')'));
  grad.addColorStop(1,    'rgba(255,255,255,0)');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.ellipse(cxPx, y, stageSize * 0.085, stageSize * 0.014, 0, 0, Math.PI * 2);
  ctx.fill();
}

function drawVesselOutline(theme) {
  // Multi-stroke glow — wide soft underlayer, then crisper top stroke.
  // Use shadowBlur for soft halo, multiple passes for layered glow.
  ctx.save();
  const layers = [
    { blur: 28, width: 4, alpha: 0.18, color: theme.vesselGlow },
    { blur: 14, width: 2.2, alpha: 0.35, color: theme.vesselGlow },
    { blur: 6,  width: 1.2, alpha: 0.62, color: theme.vesselGlow },
    { blur: 0,  width: 0.55, alpha: 0.88, color: 'rgba(255, 246, 230, 0.9)' },
  ];
  for (const L of layers) {
    pathHourglassOutline();
    ctx.shadowBlur = L.blur;
    ctx.shadowColor = L.color;
    ctx.lineWidth = L.width;
    ctx.strokeStyle = L.color.replace(/[\d.]+\)$/, L.alpha + ')');
    ctx.stroke();
  }
  ctx.restore();
}

function drawCapRings(theme) {
  // Cap rings: two soft horizontal arcs at top + bottom, mostly decorative.
  const ucTop = FRAC.upperTop * stageSize;
  const lcBot = FRAC.lowerBot * stageSize;
  const capTopY = FRAC.capTop * stageSize;
  const capBotY = FRAC.capBot * stageSize;
  const ringW = chamberHalfW(ucTop + 1, true) * 2 + 30;

  ctx.save();
  for (const [yMid, isTop] of [[ (ucTop + capTopY) / 2, true ], [ (lcBot + capBotY) / 2, false ]]) {
    // Two horizontal lines: outer wider, inner thinner
    ctx.shadowBlur = 16;
    ctx.shadowColor = theme.vesselGlow;
    const ringStart = cxPx - ringW / 2;
    const ringEnd = cxPx + ringW / 2;
    // Outer ring — soft fade
    ctx.lineWidth = 2.8;
    ctx.strokeStyle = theme.capAccent.replace(/[\d.]+\)$/, '0.32)');
    ctx.beginPath();
    ctx.moveTo(ringStart, yMid - 5);
    ctx.lineTo(ringEnd, yMid - 5);
    ctx.stroke();
    // Inner ring — crisper
    ctx.lineWidth = 1.2;
    ctx.shadowBlur = 8;
    ctx.strokeStyle = theme.capAccent;
    ctx.beginPath();
    ctx.moveTo(ringStart + 4, yMid + 2);
    ctx.lineTo(ringEnd - 4, yMid + 2);
    ctx.stroke();
    // Tiny accents at the ring corners
    ctx.lineWidth = 0;
    ctx.fillStyle = theme.capAccent;
    ctx.beginPath();
    ctx.arc(ringStart, yMid - 5, 1.6, 0, Math.PI * 2);
    ctx.arc(ringEnd, yMid - 5, 1.6, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

// ============================================================
// ATMOSPHERIC MOTES (bounded floating particles)
// ============================================================
const MOTE_COUNT = 38;
let motes = []; // { x, y, vx, vy, phase, r }

function initMotes() {
  motes = [];
  for (let i = 0; i < MOTE_COUNT; i++) {
    motes.push({
      x: Math.random() * stageSize,
      y: Math.random() * stageSize,
      vx: (Math.random() - 0.5) * 0.18,
      vy: (Math.random() - 0.5) * 0.18,
      phase: Math.random() * Math.PI * 2,
      r: 0.6 + Math.random() * 1.7,
    });
  }
}

function stepMotes(dt) {
  if (motes.length === 0) initMotes();
  const dts = dt / 1000;
  for (const m of motes) {
    m.phase += dts * 0.6;
    m.x += m.vx + Math.sin(m.phase) * 0.12;
    m.y += m.vy + Math.cos(m.phase * 0.83) * 0.10;
    if (m.x < -10) m.x = stageSize + 10;
    if (m.x > stageSize + 10) m.x = -10;
    if (m.y < -10) m.y = stageSize + 10;
    if (m.y > stageSize + 10) m.y = -10;
  }
}

function drawAtmosphere(theme, pushXY) {
  if (motes.length === 0) initMotes();
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  for (const m of motes) {
    const a = 0.4 + 0.4 * Math.sin(m.phase);
    // Background motes are pushed radially by the burst shockwave too — adds
    // a "dust kicked up" feel as the ring sweeps past them.
    const [mx, my] = pushXY ? pushXY(m.x, m.y) : [m.x, m.y];
    ctx.fillStyle = theme.motes.replace(/[\d.]+\)$/, (a * 0.6).toFixed(3) + ')');
    ctx.beginPath();
    ctx.arc(mx, my, m.r * 1.6, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = theme.motes;
    ctx.beginPath();
    ctx.arc(mx, my, m.r * 0.4, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

function drawDebugChamberOutline() {
  ctx.save();
  ctx.strokeStyle = 'rgba(255, 0, 100, 0.85)';
  ctx.lineWidth = 1;
  for (const isUpper of [true, false]) {
    const cTop = (isUpper ? FRAC.upperTop : FRAC.lowerTop) * stageSize;
    const cBot = (isUpper ? FRAC.upperBot : FRAC.lowerBot) * stageSize;
    ctx.beginPath();
    let started = false;
    for (let y = cTop; y <= cBot; y += 1) {
      const hw = chamberHalfW(y, isUpper);
      if (!started) { ctx.moveTo(cxPx - hw, y); started = true; }
      else ctx.lineTo(cxPx - hw, y);
    }
    for (let y = cBot; y >= cTop; y -= 1) {
      const hw = chamberHalfW(y, isUpper);
      ctx.lineTo(cxPx + hw, y);
    }
    ctx.closePath();
    ctx.stroke();
  }
  ctx.restore();
}

function drawColumns(theme, cols, floorArr) {
  // Render pile in two phases:
  //   1) silhouette — a smooth filled path joining each column's floor (bottom)
  //      to its top (height), giving a continuous surface (no per-column staircase)
  //   2) surface texture — jittered grain dots on the topmost rows for tactile detail
  const palette = theme.sandPalette;
  const additive = theme.additive;
  const base = palette[Math.floor(palette.length / 2)];
  const dark = palette[Math.max(0, Math.floor(palette.length / 2) - 1)];

  // Find continuous non-empty runs (the pile can have empty center funnel +
  // two side wings, in which case we draw each wing as a separate filled shape).
  // Threshold instead of `> 0` since cols here is a float display array.
  const EPS = 0.05;
  let i = 0;
  while (i < NUM_COLS) {
    if (cols[i] <= EPS) { i++; continue; }
    const start = i;
    while (i < NUM_COLS && cols[i] > EPS) i++;
    const end = i - 1;
    drawPileRun(cols, floorArr, start, end, base, dark);
    drawPileRunTexture(cols, floorArr, start, end, palette, additive, theme.sandGlow);
  }
}

function drawPileRun(cols, floorArr, start, end, baseColor, darkColor) {
  ctx.beginPath();
  for (let j = start; j <= end; j++) {
    const xCenter = cxPx + (j - (NUM_COLS - 1) / 2) * COL_W;
    const y = floorArr[j];
    if (j === start) ctx.moveTo(xCenter, y);
    else ctx.lineTo(xCenter, y);
  }
  for (let j = end; j >= start; j--) {
    const xCenter = cxPx + (j - (NUM_COLS - 1) / 2) * COL_W;
    const topY = floorArr[j] - cols[j] * GRAIN_H;
    ctx.lineTo(xCenter, topY);
  }
  ctx.closePath();
  // Slight vertical gradient (lighter at top edge, base color elsewhere)
  const minTop = Math.min(...Array.from(cols.slice(start, end + 1)).map((c, k) => floorArr[start + k] - c * GRAIN_H));
  const maxBot = Math.max(...Array.from(cols.slice(start, end + 1)).map((_, k) => floorArr[start + k]));
  if (isFinite(minTop) && isFinite(maxBot) && maxBot > minTop) {
    const g = ctx.createLinearGradient(0, minTop, 0, maxBot);
    g.addColorStop(0, baseColor);
    g.addColorStop(1, darkColor);
    ctx.fillStyle = g;
  } else {
    ctx.fillStyle = baseColor;
  }
  ctx.fill();
}

function drawPileRunTexture(cols, floorArr, start, end, palette, additive, sandGlow) {
  // Only render texture on top ~3 grain rows of each column — that's the visible
  // surface. cols here is the float display array: render `fullGrains` integer
  // rows at full opacity, plus a topmost partial grain at row=fullGrains whose
  // alpha = fractional part. Without the partial grain the texture would pop in
  // discrete steps every time displayCol crosses an integer during settle anim.
  for (let j = start; j <= end; j++) {
    const h = cols[j];
    if (h <= 0.05) continue;
    const fullGrains = Math.floor(h);
    const fracTop = h - fullGrains; // 0..1
    const xCenter = cxPx + (j - (NUM_COLS - 1) / 2) * COL_W;
    const floorY = floorArr[j];
    const visStart = Math.max(0, fullGrains - 3);
    // topK iterates: integer rows visStart..fullGrains-1 at full alpha, then
    // fullGrains at fractional alpha (skipped if frac is tiny).
    const lastK = fracTop > 0.05 ? fullGrains : fullGrains - 1;
    for (let k = visStart; k <= lastK; k++) {
      const isFractional = (k === fullGrains && fracTop > 0.05);
      const alpha = isFractional ? fracTop : 1;
      const jx = ((Math.sin(j * 7.31 + k * 3.97) + Math.cos(j * 1.93 + k * 11.0)) * 0.32) * COL_W * 0.40;
      const jy = (Math.sin(j * 4.21 + k * 5.13)) * GRAIN_H * 0.14;
      const gx = xCenter + jx;
      const gy = floorY - ((k + 0.5) * GRAIN_H) + jy;
      const tone = (Math.sin(j * 9.7 + k * 6.3) + Math.cos(j * 2.1 + k * 13.1)) * 0.5 + 0.5;
      const paletteIdx = Math.floor(tone * (palette.length - 0.001));
      ctx.globalAlpha = alpha;
      ctx.fillStyle = palette[paletteIdx];
      const r = GRAIN_R * (0.55 + ((tone * 2 + j * 0.13) % 1) * 0.30);
      ctx.beginPath();
      ctx.arc(gx, gy, r, 0, Math.PI * 2);
      ctx.fill();
      if (additive && (j + k) % 3 === 0) {
        ctx.fillStyle = sandGlow;
        ctx.beginPath();
        ctx.arc(gx, gy, r * 2.2, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }
  ctx.globalAlpha = 1;
}

function drawGrain(theme, x, y, size, hueIdx) {
  const palette = theme.sandPalette;
  ctx.fillStyle = palette[hueIdx % palette.length];
  ctx.beginPath();
  ctx.arc(x, y, size, 0, Math.PI * 2);
  ctx.fill();
  if (theme.additive) {
    ctx.fillStyle = theme.sandGlow;
    ctx.beginPath();
    ctx.arc(x, y, size * 3, 0, Math.PI * 2);
    ctx.fill();
  }
}

// ============================================================
// AUDIO (subtle, gated on first user gesture; iOS-safe)
//   - sand rustle: continuous filtered pink-noise loop, gain follows drain
//   - impact tick: tiny filtered-noise pop when a grain lands (throttled)
//   - flip chime + whoosh: short envelope on flip trigger
// Per project audio rules: all buffers pre-allocated; AudioContext.resume()
// called ONCE; nothing complex until 500ms after first gesture.
// ============================================================
let audioCtx = null;
let masterGain = null;
let noiseBuffer = null;
let rustleSource = null;
let rustleFilter = null;
let rustleGain = null;
let audioInited = false;
let audioStartedAt = 0;
let lastImpactAudioTime = 0;

function audioResumeOnce() {
  if (audioInited) return;
  const Ctx = window.AudioContext || window.webkitAudioContext;
  if (!Ctx) { audioInited = true; return; }
  audioCtx = new Ctx();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.85;
  masterGain.connect(audioCtx.destination);

  // Pre-allocate a 2-second pink-noise buffer
  const len = audioCtx.sampleRate * 2;
  const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
  for (let i = 0; i < len; i++) {
    const w = Math.random() * 2 - 1;
    b0 = 0.99886 * b0 + w * 0.0555179;
    b1 = 0.99332 * b1 + w * 0.0750759;
    b2 = 0.96900 * b2 + w * 0.1538520;
    b3 = 0.86650 * b3 + w * 0.3104856;
    b4 = 0.55000 * b4 + w * 0.5329522;
    b5 = -0.7616 * b5 - w * 0.0168980;
    data[i] = (b0 + b1 + b2 + b3 + b4 + b5 + b6 + w * 0.5362) * 0.11;
    b6 = w * 0.115926;
  }
  noiseBuffer = buf;

  // Start the rustle voice with gain 0 — gain ramps in/out with drain activity
  rustleSource = audioCtx.createBufferSource();
  rustleSource.buffer = buf;
  rustleSource.loop = true;
  rustleFilter = audioCtx.createBiquadFilter();
  rustleFilter.type = 'lowpass';
  rustleFilter.frequency.value = 900;
  rustleFilter.Q.value = 0.4;
  rustleGain = audioCtx.createGain();
  rustleGain.gain.value = 0;
  rustleSource.connect(rustleFilter);
  rustleFilter.connect(rustleGain);
  rustleGain.connect(masterGain);
  // Delay 80ms — iOS occasionally hiccups if started in the same tick as user gesture
  rustleSource.start(audioCtx.currentTime + 0.08);

  audioCtx.resume().catch(() => {});
  audioStartedAt = audioCtx.currentTime;
  audioInited = true;
}

function tickAudio() {
  if (!audioInited || !audioCtx || audioCtx.state !== 'running') return;
  // Rustle volume tracks active grain count, smoothed by the audio param
  const targetGain = Math.min(0.045, inFlight.length * 0.0035);
  if (rustleGain) rustleGain.gain.setTargetAtTime(targetGain, audioCtx.currentTime, 0.35);
}

function playImpactPing() {
  if (!audioInited || !audioCtx || audioCtx.state !== 'running') return;
  if (audioCtx.currentTime - audioStartedAt < 0.2) return; // give iOS context room
  const now = audioCtx.currentTime;
  if (now - lastImpactAudioTime < 0.07) return; // throttle: max ~14/s
  lastImpactAudioTime = now;
  const src = audioCtx.createBufferSource();
  src.buffer = noiseBuffer;
  src.playbackRate.value = 0.45 + Math.random() * 0.4;
  const fil = audioCtx.createBiquadFilter();
  fil.type = 'highpass';
  fil.frequency.value = 1100;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0, now);
  g.gain.linearRampToValueAtTime(0.012, now + 0.004);
  g.gain.exponentialRampToValueAtTime(0.0001, now + 0.07);
  src.connect(fil); fil.connect(g); g.connect(masterGain);
  src.start(now);
  src.stop(now + 0.09);
}

function playFlipSound() {
  if (!audioInited || !audioCtx || audioCtx.state !== 'running') return;
  if (audioCtx.currentTime - audioStartedAt < 0.5) return; // iOS: avoid same-gesture complexity
  const now = audioCtx.currentTime;

  // (1) Soft chime: sine glissando — keeps the melodic identity of the toy.
  const osc = audioCtx.createOscillator();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(196, now);
  osc.frequency.exponentialRampToValueAtTime(392, now + 0.16);
  osc.frequency.exponentialRampToValueAtTime(294, now + 0.62);
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0, now);
  g.gain.linearRampToValueAtTime(0.07, now + 0.07);
  g.gain.exponentialRampToValueAtTime(0.0001, now + 0.85);
  osc.connect(g); g.connect(masterGain);
  osc.start(now); osc.stop(now + 0.9);

  // (2) Sub-bass thump — the physical weight of being turned over. Sine drops
  //     from 82 → 48 Hz over 280ms with a sharp transient and exponential tail.
  const subOsc = audioCtx.createOscillator();
  subOsc.type = 'sine';
  subOsc.frequency.setValueAtTime(82, now);
  subOsc.frequency.exponentialRampToValueAtTime(48, now + 0.28);
  const subG = audioCtx.createGain();
  subG.gain.setValueAtTime(0, now);
  subG.gain.linearRampToValueAtTime(0.16, now + 0.010);
  subG.gain.exponentialRampToValueAtTime(0.0001, now + 0.32);
  subOsc.connect(subG); subG.connect(masterGain);
  subOsc.start(now); subOsc.stop(now + 0.34);

  // (3) Glass cluster — three slightly-detuned high sines provide the crystal
  //     sparkle that pairs with the visual flash. Fast attack, ~700ms tail.
  const glassPartials = [2960, 3970, 5520];
  for (const f of glassPartials) {
    const detune = 1 + (Math.random() - 0.5) * 0.006;
    const o = audioCtx.createOscillator();
    o.type = 'sine';
    o.frequency.setValueAtTime(f * detune, now);
    const og = audioCtx.createGain();
    og.gain.setValueAtTime(0, now);
    og.gain.linearRampToValueAtTime(0.018, now + 0.015);
    og.gain.exponentialRampToValueAtTime(0.0001, now + 0.7);
    o.connect(og); og.connect(masterGain);
    o.start(now); o.stop(now + 0.75);
  }

  // (4) Filter-sweep noise — wide-open lowpass closes from 5kHz → 200Hz in
  //     400ms, giving the "flipping air" sensation through the rotation.
  const src = audioCtx.createBufferSource();
  src.buffer = noiseBuffer;
  const fil = audioCtx.createBiquadFilter();
  fil.type = 'lowpass';
  fil.frequency.setValueAtTime(5000, now);
  fil.frequency.exponentialRampToValueAtTime(200, now + 0.4);
  const wg = audioCtx.createGain();
  wg.gain.setValueAtTime(0, now);
  wg.gain.linearRampToValueAtTime(0.06, now + 0.05);
  wg.gain.exponentialRampToValueAtTime(0.0001, now + 0.5);
  src.connect(fil); fil.connect(wg); wg.connect(masterGain);
  src.start(now); src.stop(now + 0.55);
}

// ============================================================
// SENSOR BRIDGE
// ============================================================
const gravityRef = { x: 0, y: 1 };
const gravityRaw = { x: 0, y: 1 };
let lastZSign = 1;
let zFlipDetector = { accum: 0 };
let sensorActive = false;
let aigramActive = false;

function applyAccel(ax, ay, az) {
  if ((ax === 0 && ay === 0 && az === 0) || ax == null || ay == null) return;
  let gx = ax / 9.8;
  let gy = -ay / 9.8;
  const m = Math.hypot(gx, gy);
  if (m > 0.001) { gx /= Math.max(1, m); gy /= Math.max(1, m); }
  gravityRaw.x = gx;
  gravityRaw.y = gy;
  sensorActive = true;

  if (typeof az === 'number') {
    const zSign = az < 0 ? -1 : 1;
    if (zSign !== lastZSign) {
      zFlipDetector.accum += 1;
      if (zFlipDetector.accum > 3 && Math.abs(az) > 6) {
        lastZSign = zSign;
        zFlipDetector.accum = 0;
        startFlip();
      }
    } else {
      zFlipDetector.accum = 0;
    }
  }
}
function applyGamma(gamma, beta) {
  if (gamma == null && beta == null) return;
  if (gamma === 0 && beta === 0) return;
  const g = (gamma || 0) / 45;
  const b = beta == null ? 90 : beta;
  const yFactor = Math.max(0, Math.min(1, b / 90));
  gravityRaw.x = Math.max(-1, Math.min(1, g));
  gravityRaw.y = yFactor;
  const mn = Math.hypot(gravityRaw.x, gravityRaw.y);
  if (mn > 0.001) { gravityRaw.x /= mn; gravityRaw.y /= mn; }
  sensorActive = true;
}

function sendAigram(msg) {
  if (window.parent && window.parent !== window) {
    try { window.parent.postMessage(JSON.stringify(msg), '*'); } catch (e) {}
  }
}
window.addEventListener('message', (ev) => {
  let data = ev.data;
  if (typeof data === 'string') {
    try { data = JSON.parse(data); } catch (e) { return; }
  }
  if (!data || !data.eventType) return;
  if (data.eventType === 'accelerometer_data' || data.eventType === 'TG.ACCELEROMETER') {
    const d = data.data || data.eventData || {};
    if (typeof d.x === 'number') {
      aigramActive = true;
      applyAccel(d.x, d.y, d.z);
    }
  }
});
function tryAigramInit() {
  sendAigram({ eventType: 'web_app_start_accelerometer', eventData: { refresh_rate: 20 } });
}
function tryTelegramWebAppInit() {
  try {
    const tg = window.Telegram && window.Telegram.WebApp;
    if (!tg) return;
    if (tg.Accelerometer && tg.Accelerometer.start) {
      tg.Accelerometer.start({ refresh_rate: 20 }, () => {});
      window.addEventListener('accelerometerChanged', () => {
        const a = tg.Accelerometer;
        if (a && typeof a.x === 'number') applyAccel(a.x, a.y, a.z);
      });
    }
  } catch (e) {}
}
let domBound = false;
function bindDomSensors() {
  if (domBound) return;
  domBound = true;
  window.addEventListener('deviceorientation', (e) => {
    if (aigramActive) return;
    applyGamma(e.gamma, e.beta);
  }, { passive: true });
  window.addEventListener('devicemotion', (e) => {
    if (aigramActive) return;
    const ag = e.accelerationIncludingGravity;
    if (!ag) return;
    applyAccel(ag.x || 0, ag.y || 0, ag.z || 0);
  }, { passive: true });
}
function requestIosPermsIfNeeded() {
  if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
    return DeviceMotionEvent.requestPermission().then((r) => r === 'granted').catch(() => false);
  }
  return Promise.resolve(true);
}

// ============================================================
// INTERACTION
// ============================================================
let currentTheme = 'sahara';
function setTheme(name) {
  if (!THEMES[name]) return;
  currentTheme = name;
  document.body.setAttribute('data-theme', name);
  document.querySelectorAll('.switcher-btn').forEach((b) => {
    b.classList.toggle('is-active', b.dataset.theme === name);
  });
  refreshClimateAndTemp();
  cycleNextPoem(true);
}

function pointInStage(sx, sy) {
  return sx >= stageX && sx <= stageX + stageSize && sy >= stageY && sy <= stageY + stageSize;
}

let hintGone = false;
function hideHint() {
  if (hintGone) return;
  hintGone = true;
  const h = document.getElementById('hint');
  h.classList.remove('is-visible');
  h.classList.add('is-gone');
}
function showHint() {
  if (hintGone) return;
  document.getElementById('hint').classList.add('is-visible');
}

// Any tap on the stage (anywhere on the hourglass) triggers a flip-with-fact.
// During drain: shows fact based on elapsed seconds, then visual flip.
// During fact display: skips the wait and starts the visual flip now.
// During flip: ignored.
function onAnyPointerDown(ev) {
  ev.preventDefault();
  audioResumeOnce();
  const sx = ev.clientX;
  const sy = ev.clientY;
  if (!aigramActive && !sensorActive) {
    requestIosPermsIfNeeded().then((ok) => { if (ok) bindDomSensors(); });
  }
  // Light sparkle ambient feedback at tap point inside the stage
  if (pointInStage(sx, sy)) {
    spawnSparkle(sx - stageX, sy - stageY);
  }
  hideHint();
  startFlip();
}
stage.addEventListener('pointerdown', onAnyPointerDown);
window.addEventListener('contextmenu', (e) => e.preventDefault());
document.getElementById('switcher').addEventListener('pointerdown', (ev) => {
  const btn = ev.target.closest('.switcher-btn');
  if (!btn) return;
  setTheme(btn.dataset.theme);
  ev.stopPropagation();
});

// ============================================================
// INFO STRIP
// ============================================================
const elTime = document.getElementById('status-time');
const elClim = document.getElementById('status-clim');
const elTemp = document.getElementById('status-temp');
const elPoem = document.getElementById('poem');

function fmtTime() {
  const d = new Date();
  return String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
}
function refreshClimateAndTemp() {
  const th = THEMES[currentTheme];
  elClim.textContent = t(th.climate[Math.floor(Math.random() * th.climate.length)]);
  elTemp.textContent = th.temps[Math.floor(Math.random() * th.temps.length)];
}
function tickStatus() { elTime.textContent = fmtTime(); }
let poemIndex = 0;
function cycleNextPoem(immediate) {
  const th = THEMES[currentTheme];
  poemIndex = (poemIndex + 1) % th.poems.length;
  const delay = immediate ? 200 : 1500;
  elPoem.classList.remove('is-visible');
  setTimeout(() => {
    elPoem.textContent = t(th.poems[poemIndex]);
    elPoem.classList.add('is-visible');
  }, delay);
}

// ============================================================
// FACT CARD — show after drain, hide when flip begins.
// ============================================================
const elFactCard     = document.getElementById('fact-card');
const elFactDuration = document.getElementById('fc-duration');
const elFactBody     = document.getElementById('fc-body');
const elFactSub      = document.getElementById('fc-sub');

// Update the persistent fact card with a fresh fact. If it's already visible,
// do a quick fade-out → swap text → fade-in for a clean transition; otherwise
// just fade in. The card never auto-hides — it stays until the next flip.
// The body text is revealed via a typewriter so the player has a beat to read
// and the flip feels more deliberate.
let factSwapToken = 0;
const TYPE_CHAR_MS = 32; // per-char reveal speed for the fact body

function startTypewriter(text, token) {
  elFactBody.textContent = '';
  elFactBody.classList.add('is-typing');
  // Slight initial pause so the duration label lands first.
  let i = 0;
  const step = () => {
    if (token !== factSwapToken) return; // superseded by a newer flip
    if (i >= text.length) {
      elFactBody.classList.remove('is-typing');
      return;
    }
    i++;
    elFactBody.textContent = text.slice(0, i);
    setTimeout(step, TYPE_CHAR_MS);
  };
  setTimeout(step, 120);
}

function updateFactCard(elapsedSec) {
  const { bucket, fact } = pickFact(elapsedSec);
  const durationText = formatDurationLabel(bucket);
  const bodyText     = t(fact);
  const myToken = ++factSwapToken;
  document.body.classList.add('has-fact');

  const isVisible = elFactCard.classList.contains('is-visible');
  if (isVisible) {
    elFactCard.classList.remove('is-visible');
    setTimeout(() => {
      if (myToken !== factSwapToken) return; // a newer swap superseded us
      elFactDuration.textContent = durationText;
      elFactSub.textContent      = t(FACT_INTRO);
      startTypewriter(bodyText, myToken);
      elFactCard.classList.add('is-visible');
    }, 480);
  } else {
    elFactDuration.textContent = durationText;
    elFactSub.textContent      = t(FACT_INTRO);
    startTypewriter(bodyText, myToken);
    requestAnimationFrame(() => elFactCard.classList.add('is-visible'));
  }
}
function hideFactCard() {
  elFactCard.classList.remove('is-visible');
  document.body.classList.remove('has-fact');
}

// ============================================================
// MAIN LOOP / INIT
// ============================================================
let lastFrameTime = 0;
function isPosterMode() {
  return new URLSearchParams(location.search).get('poster') === '1';
}
function init() {
  if (isPosterMode()) document.body.classList.add('is-poster');
  pickCycleDuration();
  resize();
  window.addEventListener('resize', resize);
  setTheme('sahara');
  // Bilingual hint
  const hintTextEl = document.getElementById('hint-text');
  hintTextEl.textContent = t({ en: 'Tap to flip', zh: '点屏幕翻沙漏' });

  tickStatus();
  setInterval(tickStatus, 30000);
  setTimeout(() => cycleNextPoem(true), 1200);
  setInterval(() => cycleNextPoem(false), 22000);
  setTimeout(() => showHint(), 1800);
  setTimeout(() => hideHint(), 16000);

  tryAigramInit();
  tryTelegramWebAppInit();
  if (typeof DeviceMotionEvent === 'undefined' || typeof DeviceMotionEvent.requestPermission !== 'function') {
    bindDomSensors();
  }

  requestAnimationFrame(frame);
}
init();
</script>
